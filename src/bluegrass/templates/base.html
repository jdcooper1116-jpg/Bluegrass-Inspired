<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bluegrass{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">Bluegrass</a>
    <a href="/" {% if active == "overview" %}class="active"{% endif %}>Overview</a>
    <a href="/session/Midday" {% if active == "Midday" %}class="active"{% endif %}>Midday</a>
    <a href="/session/Evening" {% if active == "Evening" %}class="active"{% endif %}>Evening</a>
    <a href="/session/Night" {% if active == "Night" %}class="active"{% endif %}>Night</a>
    <span class="nav-sep">|</span>
    <a href="/convergence/overview" {% if active == "convergence_overview" %}class="active"{% endif %}>Convergence</a>
    <a href="/convergence/session/Midday" {% if active == "conv_Midday" %}class="active"{% endif %}>Conv·M</a>
    <a href="/convergence/session/Evening" {% if active == "conv_Evening" %}class="active"{% endif %}>Conv·E</a>
    <a href="/convergence/session/Night" {% if active == "conv_Night" %}class="active"{% endif %}>Conv·N</a>
  </nav>
  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
